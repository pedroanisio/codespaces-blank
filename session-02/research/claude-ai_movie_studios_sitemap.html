<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Movie Studios — App Sitemap</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #6b6b68; --text3: #9c9a92;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --info-bg: #E6F1FB; --info-text: #0C447C;
    --success-bg: #EAF3DE; --success-text: #27500A;
    --warn-bg: #FAEEDA; --warn-text: #633806;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --coral-bg: #FAECE7; --coral-text: #712B13;
    --teal-bg: #E1F5EE; --teal-text: #085041;
    --pink-bg: #FBEAF0; --pink-text: #72243E;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --red-bg: #FCEBEB; --red-text: #791F1F;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #2c2c2a; --bg3: #3d3d3a;
      --text: #e8e6df; --text2: #9c9a92; --text3: #73726c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --info-bg: #042C53; --info-text: #85B7EB;
      --success-bg: #173404; --success-text: #97C459;
      --warn-bg: #412402; --warn-text: #FAC775;
      --purple-bg: #26215C; --purple-text: #AFA9EC;
      --coral-bg: #4A1B0C; --coral-text: #F0997B;
      --teal-bg: #04342C; --teal-text: #5DCAA5;
      --pink-bg: #4B1528; --pink-text: #ED93B1;
      --amber-bg: #412402; --amber-text: #FAC775;
      --red-bg: #501313; --red-text: #F09595;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); color: var(--text); background: var(--bg); padding: 24px; line-height: 1.5; }
  .container { max-width: 780px; margin: 0 auto; }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 20px; }

  .legend {
    display: flex; gap: 16px; padding: 10px 0; margin-bottom: 16px;
    border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text2); flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }

  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
    background: var(--info-bg); color: var(--info-text);
  }
  .badge.req { background: var(--success-bg); color: var(--success-text); }
  .badge.layer { background: var(--warn-bg); color: var(--warn-text); }

  .section { margin-bottom: 2px; }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; cursor: pointer; user-select: none;
    border-radius: var(--radius); transition: background .12s;
  }
  .section-header:hover { background: var(--bg2); }
  .chevron {
    width: 16px; height: 16px; flex-shrink: 0;
    transition: transform .2s; color: var(--text3);
  }
  .section-header.open .chevron { transform: rotate(90deg); }
  .section-header .label { font-size: 15px; font-weight: 500; }
  .section-header .schema-tag {
    margin-left: auto; font-size: 11px; font-family: var(--mono);
    color: var(--text3); background: var(--bg3); padding: 2px 7px; border-radius: 4px;
    white-space: nowrap;
  }

  .children { display: none; padding-left: 24px; }
  .children.vis { display: block; }

  .page {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 14px; border-left: 0.5px solid var(--border);
    margin-left: 7px; border-radius: 0 var(--radius) var(--radius) 0;
    transition: background .1s;
  }
  .page:hover { background: var(--bg2); }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0; margin-top: 7px;
  }
  .info { flex: 1; min-width: 0; }
  .pname { font-size: 13px; font-weight: 500; }
  .pdesc { font-size: 12px; color: var(--text2); line-height: 1.4; margin-top: 1px; }
  .entity-tag {
    font-size: 10px; font-family: var(--mono); color: var(--text3);
    background: var(--bg3); padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0; margin-top: 3px; white-space: nowrap;
  }
  .sub-children { padding-left: 16px; }

  .color-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .assembly-layers {
    display: flex; gap: 6px; align-items: center;
    padding: 8px 14px; margin: 4px 0 4px 31px;
    font-size: 11px; color: var(--text2);
    border-left: 0.5px solid var(--border);
  }
  .assembly-layers .arrow { color: var(--text3); }

  .search-box {
    width: 100%; padding: 8px 12px; margin-bottom: 16px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none;
  }
  .search-box:focus { border-color: var(--info-text); }
  .search-box::placeholder { color: var(--text3); }

  .stats-row {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 100px; padding: 10px 14px;
    background: var(--bg2); border-radius: var(--radius);
  }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 20px; font-weight: 500; margin-top: 2px; }

  .no-results { padding: 20px 14px; font-size: 14px; color: var(--text3); text-align: center; display: none; }
</style>

<div class="container">
  <h1>AI Movie Studios — app sitemap</h1>
  <p class="subtitle">Derived from unified-video-project-v3 schema (5,257 lines, 80+ entity types)</p>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Root sections</div><div class="stat-val">14</div></div>
    <div class="stat-card"><div class="stat-label">Pages</div><div class="stat-val">47</div></div>
    <div class="stat-card"><div class="stat-label">Sub-views</div><div class="stat-val">31</div></div>
    <div class="stat-card"><div class="stat-label">Entity types</div><div class="stat-val">80+</div></div>
  </div>

  <input class="search-box" type="text" placeholder="Filter pages..." id="search" oninput="filterTree(this.value)">

  <div class="legend">
    <span><span class="badge req">required</span> Required root section</span>
    <span><span class="badge">optional</span> Optional section</span>
    <span><code style="font-size:10px;background:var(--bg3);padding:2px 5px;border-radius:3px;font-family:var(--mono)">$def</code> Schema entity</span>
  </div>

  <div id="tree"></div>
  <div class="no-results" id="no-results">No pages match your filter.</div>
</div>

const tree = document.getElementById('tree');
const noResults = document.getElementById('no-results');

function chevron() {
  return '<svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 4l4 4-4 4"/></svg>';
}

function renderPage(p, depth) {
  let cls = depth > 0 ? 'page sub-page' : 'page';
  let html = '<div class="'+cls+'" data-search="'+p.n.toLowerCase()+' '+p.d.toLowerCase()+' '+p.t.toLowerCase()+'">';
  html += '<div class="dot"></div>';
  html += '<div class="info"><div class="pname">'+p.n+'</div><div class="pdesc">'+p.d+'</div></div>';
  html += '<div class="entity-tag">'+p.t+'</div>';
  html += '</div>';
  if (p.sub) {
    html += '<div class="sub-children">';
    p.sub.forEach(function(s) { html += renderPage(s, depth+1); });
    html += '</div>';
  }
  return html;
}

function renderSection(s) {
  var badge = s.req ? '<span class="badge req">required</span>' : '<span class="badge">optional</span>';
  var html = '<div class="section" data-id="'+s.id+'">';
  html += '<div class="section-header" onclick="toggle(this)">';
  html += chevron();
  html += '<span class="label">'+s.label+'</span>';
  html += badge;
  html += '<span class="schema-tag">'+s.schema+'</span>';
  html += '</div>';
  html += '<div class="children">';
  if (s.id === 'assembly') {
    html += '<div class="assembly-layers">';
    html += '<span class="badge layer">Layer 1</span> Timeline';
    html += '<span class="arrow"> → </span>';
    html += '<span class="badge layer">Layer 2</span> Edit version';
    html += '<span class="arrow"> → </span>';
    html += '<span class="badge layer">Layer 3</span> Render plan';
    html += '<span class="arrow"> → </span>';
    html += '<span class="badge layer">Layer 4</span> Final output';
    html += '</div>';
  }
  s.pages.forEach(function(p) { html += renderPage(p, 0); });
  html += '</div></div>';
  return html;
}

tree.innerHTML = sections.map(renderSection).join('');

function toggle(el) {
  el.classList.toggle('open');
  var ch = el.nextElementSibling;
  ch.classList.toggle('vis');
}

// Open first 4 sections by default
document.querySelectorAll('.section-header').forEach(function(h, i) {
  if (i < 4) { h.classList.add('open'); h.nextElementSibling.classList.add('vis'); }
});

function filterTree(q) {
  q = q.toLowerCase().trim();
  var anyVisible = false;
  document.querySelectorAll('.section').forEach(function(sec) {
    var header = sec.querySelector('.section-header');
    var children = sec.querySelector('.children');
    var pages = sec.querySelectorAll('.page');
    var sectionMatch = false;
    if (!q) {
      sec.style.display = '';
      pages.forEach(function(p) { p.style.display = ''; });
      return;
    }
    var sLabel = header.querySelector('.label').textContent.toLowerCase();
    var sSchema = header.querySelector('.schema-tag').textContent.toLowerCase();
    if (sLabel.includes(q) || sSchema.includes(q)) {
      sectionMatch = true;
    }
    var pageMatch = false;
    pages.forEach(function(p) {
      var searchText = p.getAttribute('data-search') || '';
      if (searchText.includes(q) || sectionMatch) {
        p.style.display = '';
        pageMatch = true;
      } else {
        p.style.display = 'none';
      }
    });
    if (sectionMatch || pageMatch) {
      sec.style.display = '';
      anyVisible = true;
      if (q && !header.classList.contains('open')) {
        header.classList.add('open');
        children.classList.add('vis');
      }
    } else {
      sec.style.display = 'none';
    }
  });
  noResults.style.display = (!q || anyVisible) ? 'none' : 'block';
}
</script>
